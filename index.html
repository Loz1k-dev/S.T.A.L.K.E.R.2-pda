<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>S.T.A.L.K.E.R. 2 — Колекція карток</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --zone-green: #4a7c59;
    --zone-green-light: #6fb88a;
    --zone-yellow: #c8a94a;
    --zone-dark: #0a0e0b;
    --zone-dark2: #0f1510;
    --zone-dark3: #141a15;
    --zone-mid: #1a2218;
    --zone-surface: #1f2a1e;
    --zone-border: #2d3d2b;
    --zone-border-light: #3d5038;
    --zone-text: #b8cbb4;
    --zone-text-dim: #6b7d68;
    --zone-text-bright: #d4e8d0;
    --zone-gray: #3a4438;
    --zone-red: #8b2222;
  }

  /* Жорстка фіксація екрану */
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; /* Видаляємо синю рамку при тапі */
  }

  html, body {
    width: 100%;
    max-width: 100vw;
    overflow-x: hidden; /* Заборона горизонтального скролу */
    position: relative;
    overscroll-behavior: none; /* Вимикаємо ефект відскоку в браузері */
    background: var(--zone-dark);
  }

  body {
    color: var(--zone-text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    /* Покращуємо рендеринг тексту на мобілках */
    -webkit-font-smoothing: antialiased;
  }

  /* Тонка лінія сканування (статична для мобілок, щоб не гальмувало) */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  header {
    position: relative;
    padding: 1.5rem 1rem;
    border-bottom: 1px solid var(--zone-border);
    background: linear-gradient(180deg, rgba(15,21,16,0.98) 0%, transparent 100%);
    text-align: center;
  }

  .logo-eye {
    display: inline-block;
    width: 40px; height: 40px;
    border: 2px solid var(--zone-green);
    border-radius: 50%;
    position: relative;
    margin-bottom: 0.5rem;
    animation: pulse-border 3s ease-in-out infinite;
  }
  .logo-eye::before {
    content: '';
    position: absolute;
    inset: 5px;
    background: var(--zone-green);
    border-radius: 50%;
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--zone-text-bright);
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-top: 1rem;
  }
  .stat-num { font-size: 1.1rem; color: var(--zone-green-light); font-family: 'Share Tech Mono', monospace; }
  .stat-label { font-size: 0.55rem; color: var(--zone-text-dim); text-transform: uppercase; }

  .add-card-bar {
    display: flex;
    justify-content: center;
    padding: 0.75rem;
    background: rgba(15,21,16,0.8);
    border-bottom: 1px solid var(--zone-border);
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .btn-add-card, .btn-reset-pda {
    flex: 1;
    font-family: 'Oswald', sans-serif;
    font-size: 0.75rem;
    padding: 0.6rem 0.5rem;
    border-radius: 4px;
    cursor: pointer;
    touch-action: manipulation;
    text-align: center;
  }

  .btn-add-card { border: 1px solid var(--zone-green); color: var(--zone-green-light); background: transparent; }
  .btn-reset-pda { border: 1px solid var(--zone-red); color: var(--zone-red); background: transparent; }

  .grid {
    display: grid;
    /* Чітко 4 колонки на малих екранах */
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 8px;
    width: 100%;
  }

  .card-slot {
    aspect-ratio: 2/3;
    position: relative;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s;
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    border-radius: 4px;
    backface-visibility: hidden;
    overflow: hidden;
  }

  .card-front.empty {
    background: var(--zone-surface);
    border: 1px dashed var(--zone-border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .slot-num { font-size: 0.5rem; color: var(--zone-text-dim); font-family: 'Share Tech Mono', monospace; }

  .card-front.filled { border: 1px solid var(--zone-border-light); background: var(--zone-mid); }
  .card-image-area img { width: 100%; height: 100%; object-fit: cover; }
  
  .card-info { padding: 4px; background: var(--zone-dark3); text-align: center; }
  .card-name { font-size: 0.45rem; color: var(--zone-text-bright); font-family: 'Share Tech Mono', monospace; }

  .card-back {
    transform: rotateY(180deg);
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px;
  }

  /* Модалка на весь екран по ширині для зручності */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--zone-dark3);
    border: 1px solid var(--zone-border-light);
    border-radius: 12px;
    width: 100%;
    max-width: 360px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .num-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
    padding: 5px;
  }
  .num-btn {
    aspect-ratio: 1;
    font-size: 0.7rem;
    border: 1px solid var(--zone-border);
    background: var(--zone-surface);
    color: var(--zone-text-dim);
    border-radius: 4px;
  }
  .num-btn.selected { border-color: var(--zone-green-light); background: rgba(74,124,89,0.3); color: #fff; }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 5px rgba(74,124,89,0.3); }
    50% { box-shadow: 0 0 15px rgba(74,124,89,0.5); }
  }

  .progress-bar { width: 150px; height: 3px; background: var(--zone-surface); margin: 8px auto; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--zone-green-light); width: 0%; transition: 0.5s; }
</style>
</head>
<body>

<header>
  <div class="logo-eye"></div>
  <h1>S.T.A.L.K.E.R. <span>2</span></h1>
  <div class="stats-bar">
    <div class="stat-item"><span class="stat-num" id="count-collected">0</span><div class="stat-label">Зібрано</div></div>
    <div class="stat-item"><span class="stat-num">48</span><div class="stat-label">Всього</div></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</header>

<div class="add-card-bar">
  <button class="btn-add-card" onclick="openAddModal()">+ КАРТКА</button>
  <button class="btn-reset-pda" onclick="resetAllData()">ОБНУЛИТИ</button>
</div>

<main>
  <div class="grid" id="card-grid"></div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header" style="padding: 15px; border-bottom: 1px solid var(--zone-border); display: flex; justify-content: space-between;">
      <span class="modal-title" id="modal-title">Додати</span>
      <span onclick="closeModal()" style="cursor: pointer;">✕</span>
    </div>
    <div class="modal-body" style="padding: 15px;">
      <div class="form-group" id="num-group">
        <label style="font-size: 0.7rem; color: var(--zone-text-dim); display: block; margin-bottom: 5px;">НОМЕР:</label>
        <div class="num-grid" id="num-grid"></div>
      </div>
      <div class="form-group" style="margin-top: 15px;">
        <label style="font-size: 0.7rem; color: var(--zone-text-dim); display: block; margin-bottom: 5px;">QR ПОСИЛАННЯ:</label>
        <input type="url" id="input-qr" placeholder="https://..." style="width: 100%; background: var(--zone-surface); border: 1px solid var(--zone-border); color: #fff; padding: 10px; border-radius: 6px; font-size: 0.8rem;">
      </div>
    </div>
    <div class="modal-footer" style="padding: 15px; border-top: 1px solid var(--zone-border); display: flex; gap: 10px;">
      <button class="btn btn-delete" id="btn-delete" style="display:none; color: var(--zone-red); background: none; border: none;" onclick="deleteCard()">Видалити</button>
      <button class="btn btn-save" style="background: var(--zone-green); color: #fff; flex: 1; border: none; padding: 10px; border-radius: 6px;" onclick="saveCard()">ЗБЕРЕГТИ</button>
    </div>
  </div>
</div>

<script>
const TOTAL = 48;
const STORAGE_KEY = 'stalker2_v3';
let cards = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let currentSlot = null;
let qrGenerated = {};

function cardImagePath(num) {
  return 'card-' + String(num).padStart(2,'0') + '.webp';
}

function updateStats() {
  const count = Object.keys(cards).length;
  document.getElementById('count-collected').textContent = count;
  document.getElementById('progress-fill').style.width = (count / TOTAL * 100) + '%';
}

function renderGrid() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= TOTAL; i++) {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    const card = cards[i];

    if (!card) {
      slot.innerHTML = `<div class="card-inner"><div class="card-front empty"><span class="slot-num">#${i}</span></div><div class="card-back"></div></div>`;
      slot.onclick = () => openAddModal();
    } else {
      slot.innerHTML = `
        <div class="card-inner" id="inner-${i}">
          <div class="card-front filled">
            <div class="card-image-area"><img src="${cardImagePath(i)}" onerror="this.style.opacity='0.2'"></div>
            <div class="card-info"><div class="card-name">#${i}</div></div>
          </div>
          <div class="card-back" id="qr-${i}"></div>
        </div>`;
      const inner = slot.querySelector('.card-inner');
      slot.onclick = () => {
        inner.classList.toggle('flipped');
        if (inner.classList.contains('flipped')) generateQR(i, card.qrUrl);
      };
      // Довге натискання для редагування на телефонах
      let timer;
      slot.ontouchstart = () => timer = setTimeout(() => openEditModal(i, card), 600);
      slot.ontouchend = () => clearTimeout(timer);
      slot.oncontextmenu = (e) => { e.preventDefault(); openEditModal(i, card); };
    }
    grid.appendChild(slot);
  }
  updateStats();
}

function generateQR(num, url) {
  const container = document.getElementById('qr-' + num);
  if (container.innerHTML !== "") return;
  new QRCode(container, { text: url || 'https://s2-atb.com/', width: 70, height: 70 });
}

function buildNumGrid(selected) {
  const grid = document.getElementById('num-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= TOTAL; i++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn' + (cards[i] ? ' taken' : '') + (i === selected ? ' selected' : '');
    btn.textContent = i;
    btn.onclick = () => { if(!cards[i]) { 
      document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected'); currentSlot = i; 
    }};
    grid.appendChild(btn);
  }
}

function openAddModal() {
  currentSlot = null;
  document.getElementById('input-qr').value = 'https://s2-atb.com/';
  document.getElementById('btn-delete').style.display = 'none';
  buildNumGrid(null);
  document.getElementById('modal').classList.add('active');
}

function openEditModal(num, card) {
  currentSlot = num;
  document.getElementById('input-qr').value = card.qrUrl;
  document.getElementById('btn-delete').style.display = 'block';
  document.getElementById('num-group').style.display = 'none';
  document.getElementById('modal').classList.add('active');
}

function saveCard() {
  if (!currentSlot) return alert("Обери номер!");
  cards[currentSlot] = { qrUrl: document.getElementById('input-qr').value };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
  closeModal(); renderGrid();
}

function deleteCard() {
  if (confirm('Видалити?')) { delete cards[currentSlot]; localStorage.setItem(STORAGE_KEY, JSON.stringify(cards)); closeModal(); renderGrid(); }
}

function closeModal() { document.getElementById('modal').classList.remove('active'); document.getElementById('num-group').style.display = 'block'; }

function resetAllData() {
  if (confirm("СТАЛКЕРЕ, ТИ ВПЕВНЕНИЙ? Всі дані будуть стерті!")) {
    cards = {}; localStorage.removeItem(STORAGE_KEY); renderGrid();
  }
}

renderGrid();
</script>
</body>
</html>
