<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.T.A.L.K.E.R. 2 — PDA Collector</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  /* Всі твої стилі залишаються, додаємо/правимо лише ці: */
  :root {
    --zone-green: #4a7c59;
    --zone-green-light: #6fb88a;
    --zone-dark: #0a0e0b;
    --zone-text: #b8cbb4;
  }

  /* Стиль для кнопки "Додати" у шапці */
  .add-main-btn {
    margin-top: 1.5rem;
    padding: 0.8rem 2rem;
    background: var(--zone-green);
    color: white;
    border: none;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.2em;
    cursor: pointer;
    clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
    transition: 0.3s;
  }
  .add-main-btn:hover { background: var(--zone-green-light); transform: scale(1.05); }

  /* Сірий колір для незібраних карток */
  .card-front.locked {
    filter: grayscale(1) opacity(0.3);
    pointer-events: none;
  }
  
  /* Інші стилі з твого файлу (копіюй їх сюди повністю) */
  /* ... (сюди встав свій CSS з попередньої версії) ... */
</style>
</head>
<body>

<header>
  <div class="header-decor"></div>
  <div class="logo-eye"></div>
  <h1>S.T.A.L.K.E.R. <span>2</span></h1>
  <p class="subtitle">PDA v2.1 // ALMANAC SYNC</p>
  
  <div class="stats-bar">
    <div class="stat-item"><span class="stat-num" id="count-collected">0</span><span class="stat-label">Зібрано</span></div>
    <div class="stat-item"><span class="stat-num">48</span><span class="stat-label">Всього</span></div>
  </div>

  <button class="add-main-btn" onclick="openAddModal()">+ ДОДАТИ КАРТКУ В БАЗУ</button>

  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</header>

<main>
  <div class="grid" id="card-grid"></div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">РЕЄСТРАЦІЯ ОБ'ЄКТА</span>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Виберіть номер картки (1-48)</label>
        <select id="input-slot">
          </select>
      </div>
      <div class="form-group">
        <label class="form-label">Посилання для QR-коду</label>
        <input type="text" id="input-qr" placeholder="https://s2-atb.com/...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-delete" id="btn-delete" style="display:none" onclick="deleteCard()">Видалити</button>
      <button class="btn btn-cancel" onclick="closeModal()">Закрити</button>
      <button class="btn btn-save" onclick="saveCard()">Записати в ПДА</button>
    </div>
  </div>
</div>

<script>
const TOTAL = 48;
const STORAGE_KEY = 'stalker_atb_v3';

// Об'єкт із назвами (можеш заповнити сам)
const cardNames = {
    1: "Стрілець",
    2: "Кровосос",
    3: "Артефакт 'Мамине намисто'",
    // ... і так далі до 48
};

let collectedCards = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

function init() {
    renderGrid();
    fillSelect();
    updateStats();
}

function fillSelect() {
    const select = document.getElementById('input-slot');
    for (let i = 1; i <= TOTAL; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `Картка #${String(i).padStart(2,'0')} ${cardNames[i] || ''}`;
        select.appendChild(opt);
    }
}

function renderGrid() {
    const grid = document.getElementById('card-grid');
    grid.innerHTML = '';
    for (let i = 1; i <= TOTAL; i++) {
        grid.appendChild(createCardUI(i));
    }
}

function createCardUI(num) {
    const isCollected = collectedCards[num];
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    
    // Формуємо HTML. Зображення береться з папки cards/
    slot.innerHTML = `
      <div class="card-inner ${isCollected ? '' : 'locked-inner'}" id="inner-${num}">
        <div class="card-front ${isCollected ? 'filled' : 'empty'}">
          <div class="card-rarity-bar"></div>
          <div class="card-image-area">
             <img src="cards/card-${num}.webp" onerror="this.src='https://via.placeholder.com/140x210?text=PDA+ERROR'" class="${isCollected ? '' : 'locked'}">
          </div>
          <div class="card-info">
            <div class="card-name">${cardNames[num] || 'Об\'єкт #' + num}</div>
            <div class="card-number">#${String(num).padStart(2,'0')} / 48</div>
          </div>
        </div>
        <div class="card-back">
          <div class="qr-wrapper" id="qr-${num}"></div>
          <div class="card-back-name">${cardNames[num] || 'Об\'єкт #' + num}</div>
        </div>
      </div>
    `;

    if (isCollected) {
        slot.addEventListener('click', () => {
            const inner = document.getElementById(`inner-${num}`);
            inner.classList.toggle('flipped');
            if (inner.classList.contains('flipped')) generateQR(num, isCollected.qrUrl);
        });
        
        // Редагування довгим натисканням
        slot.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            openAddModal(num);
        });
    } else {
        slot.addEventListener('click', () => openAddModal(num));
    }

    return slot;
}

function openAddModal(num = 1) {
    const existing = collectedCards[num];
    document.getElementById('input-slot').value = num;
    document.getElementById('input-qr').value = existing ? existing.qrUrl : 'https://s2-atb.com/';
    document.getElementById('btn-delete').style.display = existing ? 'block' : 'none';
    document.getElementById('modal').classList.add('active');
}

function saveCard() {
    const num = document.getElementById('input-slot').value;
    const qrUrl = document.getElementById('input-qr').value;
    
    collectedCards[num] = { qrUrl };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(collectedCards));
    
    closeModal();
    renderGrid();
    updateStats();
}

function deleteCard() {
    const num = document.getElementById('input-slot').value;
    delete collectedCards[num];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(collectedCards));
    closeModal();
    renderGrid();
    updateStats();
}

function generateQR(num, url) {
    const container = document.getElementById('qr-' + num);
    if (container.innerHTML !== "") return; // Вже згенеровано
    new QRCode(container, { text: url, width: 80, height: 80 });
}

function updateStats() {
    const count = Object.keys(collectedCards).length;
    document.getElementById('count-collected').textContent = count;
    document.getElementById('progress-fill').style.width = (count / TOTAL * 100) + '%';
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }

init();
</script>
</body>
</html>
